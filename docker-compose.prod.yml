version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: always

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://toolbox.pratyakshkwatra.com
    restart: always

  api:
    build:
      context: ./backend
      target: builder
    command: ./main
    environment:
      - PORT=8000
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=host=postgres user=toolbox password=secret dbname=toolbox port=5432 sslmode=disable
    volumes:
      - shared_tmp:/app/tmp
    depends_on:
      - redis
      - kafka
      - postgres
    restart: always

  worker:
    build:
      context: ./backend
    command: ./worker
    environment:
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=host=postgres user=toolbox password=secret dbname=toolbox port=5432 sslmode=disable
    volumes:
      - shared_tmp:/app/tmp
    depends_on:
      - redis
      - kafka
      - postgres
    restart: always
    deploy:
      replicas: 3 # Scale workers for heavy load

  redis:
    image: redis:alpine
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=toolbox
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=toolbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: always

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

volumes:
  shared_tmp:
  postgres_data:
